name: Prueba de Environments

on:
  # 1. Se activa con push a CUALQUIER rama (usando **)
  push:
    branches: [ '**' ]
  # 2. Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  # ==========================================
  # JOB 1: Despliegue a STAGING
  # ==========================================
  deploy-staging:
    runs-on: ubuntu-latest
    environment: Stating  # <--- Nombre exacto de tu entorno
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Simular despliegue a STAGING
        run: |
          echo "🚀 Desplegando en el entorno STAGING..."
          echo "📂 Rama actual: ${{ github.ref_name }}"
          echo "✅ Despliegue completado en STAGING"

  # ==========================================
  # JOB 2: Despliegue a PRODUCCIÓN (con aprobación)
  # ==========================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    # Condición: Solo se ejecuta si la rama se llama 'main' o 'master'
    if: github.ref_name == 'main' || github.ref_name == 'master'
    environment: production  # <--- Nombre exacto de tu entorno
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Simular despliegue a PRODUCCIÓN
        run: |
          echo "🔥 Desplegando en el entorno PRODUCCIÓN..."
          echo "📂 Rama: ${{ github.ref_name }}"
          echo "✅ Despliegue completado en PRODUCCIÓN"
